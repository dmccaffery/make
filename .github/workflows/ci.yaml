# The make library dogfoods its own markdown-lib archetype. This thin caller runs
# the reusable CI (v5+: mise-task aware), which discovers the canonical tasks the
# repo defines via `mise tasks ls --name-only` and runs `make <target>` for each —
# here only `lint` (addlicense + prettier + markdownlint + actionlint); build and
# test don't exist in this archetype and are skipped. The pinned tooling installs
# via mise from the repo-root config.toml/mise.lock (the file consumers load as
# .mise/config.toml); the reusable workflow's Setup mise step puts a pinned mise
# on PATH.
#
# Pinned to a full commit SHA (tag in the comment); Dependabot keeps it fresh.
name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: ["main", "releases/*"]

# the reusable workflow's jobs only need contents:read; grant just that ceiling
permissions:
  contents: read

jobs:
  ci:
    uses: bitwise-media-group/github-workflows/.github/workflows/ci.yaml@ee856f73ecea9b0c2c989d3a6aa585774b0d2a38 # v5.0.0
    with:
      # nothing to unit-test here (no test task), so skip the Codecov upload
      coverage: false
